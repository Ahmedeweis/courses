<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Long Questions | AOU Study Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <a href="home.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
        <img src="img/logo.png" alt="AOU Logo" class="w-9 h-9 rounded-full object-cover" />
        <span class="font-bold text-gray-800 text-lg">AOU Study Tracker</span>
      </a>
      <div class="flex items-center gap-6 text-sm font-medium text-gray-600">
        <a href="home.html" class="flex items-center gap-1.5 hover:text-blue-600 transition-colors">Dashboard</a>
        <a href="courses.html" class="flex items-center gap-1.5 hover:text-blue-600 transition-colors">Courses</a>
        <a href="index.html" class="flex items-center gap-1.5 hover:text-red-500 transition-colors">Logout</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-20 flex flex-col items-center justify-center text-center">



    <!-- Text Content -->
    <h1 class="text-4xl font-black text-gray-900 mb-4">No long questions available</h1>
    <p class="text-lg text-gray-400 max-w-lg mb-12 font-medium">
      Our team is currently curating high-quality, essay-style questions for <span id="courseName"
        class="text-purple-600 font-bold">this course</span>. They will appear here soon!
    </p>

    <!-- Back Button -->
    <a id="backBtn" href="practice.html"
      class="bg-white hover:bg-gray-50 text-gray-700 px-10 py-4 rounded-3xl font-bold border border-gray-200 shadow-sm transition-all flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to Practice
    </a>

  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');

    // Set dynamic course name if possible
    fetch('data/courses.json')
      .then(res => res.json())
      .then(data => {
        const course = data.courses.find(c => c.id === courseId);
        if (course) {
          document.getElementById('courseName').textContent = course.name;
        }
        if (courseId) {
          document.getElementById('backBtn').href = `practice.html?id=${courseId}`;
        }
      });
  </script>

</body>

</html>
